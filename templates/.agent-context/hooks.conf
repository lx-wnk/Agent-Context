# Agent-Context hooks configuration. Project-owned — edit freely; never overwritten on update.
# Read by .agent-context/hooks/*.sh. The hook SCRIPTS are shared (auto-updated); all behavior
# and project-specific commands live HERE.
#
# To enable, set HOOKS_ENABLED=1 and fill in your project's FORMAT_CMD / TEST_CMD below.
# The hooks must also be registered in .claude/settings.json (setup does this; see README).

# Master switch. 0 = all hooks are no-ops (default — opt in explicitly).
HOOKS_ENABLED=0

# --- PreToolUse: block writes to secret files ---
PROTECT_SECRETS=1
# Space-separated globs matched against the basename and full path of the target file.
PROTECTED_GLOBS=".env .env.* *.pem *.key id_rsa id_rsa.* *.secret secrets.*"

# --- PostToolUse: auto-format edited files ---
FORMAT_ON_EDIT=1
# Command to format a single file. Use {} for the path, or leave it off to have the path appended.
# Examples: "npx prettier --write {}"  |  "gofmt -w"  |  "php-cs-fixer fix"
FORMAT_CMD=""

# --- Stop: test gate ---
# off | warn (run tests, report failures, still stop) | block (force continue until green)
STOP_GATE="warn"
# Command that returns 0 when the suite is green. Examples: "npm test" | "composer test"
TEST_CMD=""

# --- SubagentStop: scope check ---
# off | warn (report out-of-scope writes) | block (force continue)
SUBAGENT_SCOPE="off"
# Space-separated globs a subagent is allowed to write. Empty = no enforcement.
# Example: "src/* tests/* *.md"
ALLOWED_SUBAGENT_PATHS=""
