# Token-budget configuration for the always-on context closure.
# Read by .agent-context/bin/check-token-budget.sh. Project-owned — edit freely.
#
# Run the audit manually any time:
#   bash .agent-context/bin/check-token-budget.sh
#
# Lines are a proxy for tokens — a deterministic guardrail against the baseline
# (the files loaded on every session) bloating over time, not an exact tokenizer.

# Max effective instruction lines allowed across the always-on closure.
# Target: keep the always-on baseline under ~150–200 effective instructions.
MAX_EFFECTIVE_LINES=200

# Files that load on every session (the @-include closure rooted at AGENTS.md).
# One path per line is fine; whitespace-separated also works.
INCLUDE_FILES="
.claude/CLAUDE.md
AGENTS.md
.agent-context/agent-startup.md
.agent-context/layer0-agent-workflow.md
.agent-context/base-principles.md
.agent-context/layer1-bootstrap.md
.agent-context/layer2-project-core.md
.agent-context/layer3-guidebook.md
.agent-context/knowledge-map.md
.agent-context/skills/index.md
"
