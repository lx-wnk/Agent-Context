# Token-budget configuration for the always-on context closure.
# Read by .agent-context/bin/check-token-budget.sh. Project-owned — edit freely.
#
# Run the audit manually any time:
#   bash .agent-context/bin/check-token-budget.sh
#
# Lines are a proxy for tokens — a deterministic guardrail against the baseline
# (the files loaded on every session) bloating over time, not an exact tokenizer.

# Max effective instruction lines allowed across the always-on closure.
# Target: keep the always-on baseline under ~150–200 effective instructions.
MAX_EFFECTIVE_LINES=200

# Files that load on every session (the @-include closure rooted at AGENTS.md).
# One path per line is fine; whitespace-separated also works.
INCLUDE_FILES="
.claude/CLAUDE.md
AGENTS.md
.agent-context/agent-startup.md
.agent-context/layer0-agent-workflow.md
.agent-context/base-principles.md
.agent-context/layer1-bootstrap.md
.agent-context/layer2-project-core.md
.agent-context/layer3-guidebook.md
.agent-context/knowledge-map.md
.agent-context/skills/index.md
"

# --- Discovery map caps (read by .agent-context/bin/check-map-budget.sh) ---
# The discovery map is pulled ON-DEMAND, never @-included. These caps keep the
# top index tiny so even a 10k-file repo costs only a small index + 1–2 node notes.
# A coarse repo that exceeds MAP_MAX_TOTAL_BYTES must split hierarchically into
# memory/<area>/map.json (see the discovery-map skill).

# Path to the top-level map relative to the project root.
MAP_FILE=".agent-context/map.json"

# Whole-file byte ceiling for the top index. Deliberately small.
MAP_MAX_TOTAL_BYTES=16384

# Max number of nodes in the top index (counted as "id": occurrences).
MAP_MAX_NODES=60

# Max bytes of a single node line EXCLUDING its globs array — a guard against prose bloat in the
# label, not against legitimate glob lists. Globs are never truncated to fit this; the total-byte
# cap above bounds overall size (globs included). 400 leaves ample room for a descriptive label.
MAP_MAX_NODE_LINE_BYTES=400
